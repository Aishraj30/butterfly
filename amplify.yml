version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - echo "OPENAI_API_KEY=$OPENAI_API_KEY" >> .env.production
        - echo "CLOUDINARY_CLOUD_NAME=$CLOUDINARY_CLOUD_NAME" >> .env.production
        - echo "CLOUDINARY_API_KEY=$CLOUDINARY_API_KEY" >> .env.production
        - echo "CLOUDINARY_API_SECRET=$CLOUDINARY_API_SECRET" >> .env.production
        - echo "MONGODB_URI=$MONGODB_URI" >> .env.production
        - echo "JWT_SECRET=$JWT_SECRET" >> .env.production
        - echo "JWT_EXPIRES_IN=$JWT_EXPIRES_IN" >> .env.production
        - echo "FASHN_API_KEY=$FASHN_API_KEY" >> .env.production
        - echo "REPLICATE_API_TOKEN=$REPLICATE_API_TOKEN" >> .env.production
        - echo "SEGMIND_API_KEY=$SEGMIND_API_KEY" >> .env.production
        - echo "GPT_MODEL=$GPT_MODEL" >> .env.production
        - echo "REDIS_HOST=$REDIS_HOST" >> .env.production
        - echo "REDIS_PORT=$REDIS_PORT" >> .env.production
        - echo "REDIS_USERNAME=$REDIS_USERNAME" >> .env.production
        - echo "REDIS_PASSWORD=$REDIS_PASSWORD" >> .env.production
        - echo "REDIS_URL=$REDIS_URL" >> .env.production
        - echo "SMTP_HOST=$SMTP_HOST" >> .env.production
        - echo "SMTP_PORT=$SMTP_PORT" >> .env.production
        - echo "SMTP_USER=$SMTP_USER" >> .env.production
        - echo "SMTP_PASS=$SMTP_PASS" >> .env.production
        - echo "SMTP_USERNAME=$SMTP_USERNAME" >> .env.production
        - echo "SMTP_FROM=$SMTP_FROM" >> .env.production
        - echo "S3_REGION=$S3_REGION" >> .env.production
        - echo "S3_ACCESS_KEY=$S3_ACCESS_KEY" >> .env.production
        - echo "S3_SECRET_KEY=$S3_SECRET_KEY" >> .env.production
        - echo "S3_BUCKET_NAME=$S3_BUCKET_NAME" >> .env.production
        - echo "NODE_ENV=$NODE_ENV" >> .env.production
        - echo "NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL" >> .env.production
        - echo "NEXT_PUBLIC_GA_ID=$NEXT_PUBLIC_GA_ID" >> .env.production
        - echo "NEXT_PUBLIC_BRAND_COLOR=$NEXT_PUBLIC_BRAND_COLOR" >> .env.production
        - echo "NEXT_PUBLIC_ACCENT_COLOR=$NEXT_PUBLIC_ACCENT_COLOR" >> .env.production
        - echo "STORE_NAME=$STORE_NAME" >> .env.production
        - echo "STORE_CURRENCY=$STORE_CURRENCY" >> .env.production
        - echo "STORE_TAX_RATE=$STORE_TAX_RATE" >> .env.production
        - echo "CONTACT_EMAIL=$CONTACT_EMAIL" >> .env.production
        - echo "SUPPORT_EMAIL=$SUPPORT_EMAIL" >> .env.production
    build:
      commands:
        - npm run build
        - rm -rf .next/cache
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
